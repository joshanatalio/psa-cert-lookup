<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Cert Lookup</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 16px/1.4 -apple-system, system-ui, sans-serif;
      background: #f2f2f7; color: #111;
      padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    }
    @media (prefers-color-scheme: dark) { body { background: #000; color: #eee; } }
    header { position: sticky; top: 0; padding: 12px 0; background: inherit; }
    h1 { font-size: 17px; margin: 4px 0 10px; }
    form { display: flex; gap: 8px; }
    input {
      flex: 1; min-width: 0; font-size: 17px; padding: 12px; border-radius: 10px;
      border: 1px solid #ccc; background: #fff; color: #111;
    }
    @media (prefers-color-scheme: dark) { input { background: #1c1c1e; color: #eee; border-color: #333; } }
    button {
      font-size: 17px; font-weight: 600; padding: 12px 16px; border: 0;
      border-radius: 10px; background: #0a84ff; color: #fff;
    }
    button:disabled { opacity: .5; }
    #cam { background: #e5e5ea; }
    @media (prefers-color-scheme: dark) { #cam { background: #2c2c2e; } }
    #status { min-height: 20px; margin: 10px 2px; font-size: 14px; color: #666; }
    #label { font-weight: 600; margin: 6px 2px 12px; }
    #summary { display: flex; gap: 8px; margin: 0 0 14px; }
    .card {
      flex: 1; background: #fff; border-radius: 12px; padding: 12px 14px; border: 1px solid #0001;
    }
    @media (prefers-color-scheme: dark) { .card { background: #1c1c1e; border-color: #333; } }
    .card .name { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #888; }
    .card .val { font-size: 24px; font-weight: 700; margin: 2px 0; }
    .card .sub { font-size: 12px; color: #888; }
    .sales { margin: 0 0 18px; }
    .sec-title { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin: 0 2px 8px; }
    .sale {
      display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      background: #fff; border: 1px solid #0001; border-radius: 10px; padding: 9px 12px; margin-bottom: 6px;
      text-decoration: none; color: inherit;
    }
    a.sale { cursor: pointer; }
    a.sale:active { opacity: .7; }
    a.sale .price { color: #0a84ff; }
    @media (prefers-color-scheme: dark) { .sale { background: #1c1c1e; border-color: #333; } }
    .sale .price { font-weight: 700; font-size: 16px; white-space: nowrap; }
    .sale .meta { font-size: 12px; color: #8a8a8e; }
    .sale .desc { font-size: 11px; color: #a5a5aa; margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
    #tabs { display: flex; gap: 6px; margin: 4px 0 14px; }
    .tab {
      flex: 1; text-align: center; font-size: 14px; font-weight: 600; padding: 10px;
      border-radius: 10px; background: #e5e5ea; color: #333;
    }
    @media (prefers-color-scheme: dark) { .tab { background: #2c2c2e; color: #ddd; } }
    .tab.active { background: #0a84ff; color: #fff; }
    .sub-title { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin: 16px 2px 8px; }
  </style>
</head>
<body>
  <header>
    <h1>🔴 PSA Cert Lookup</h1>
    <form id="f">
      <input id="cert" inputmode="numeric" autocomplete="off" placeholder="Enter a PSA cert #" />
      <button id="cam" type="button" title="Take or choose a photo">📷</button>
      <button id="go" type="submit">Look up</button>
    </form>
    <!-- No `capture` attribute: iOS shows its native "Take Photo / Photo Library" chooser. -->
    <input id="photo" type="file" accept="image/*" hidden />
    <div id="status"></div>
    <div id="label"></div>
    <div id="summary"></div>
    <div id="tabs" hidden>
      <div class="tab active" data-tab="cardladder">CardLadder</div>
      <div class="tab" data-tab="alt">Alt</div>
    </div>
  </header>
  <main id="out"></main>

  <script>
    const f = document.getElementById('f');
    const certEl = document.getElementById('cert');
    const go = document.getElementById('go');
    const statusEl = document.getElementById('status');
    const labelEl = document.getElementById('label');
    const summaryEl = document.getElementById('summary');
    const out = document.getElementById('out');

    const money = (n) => (n == null ? '—' : '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 }));

    function renderSummary(data) {
      summaryEl.innerHTML = '';
      if (!data) return;
      const cl = data.cardladder || {}, alt = data.alt || {};
      const cards = [
        {
          name: 'CardLadder · last sale',
          val: money(cl.last_sale),
          sub: (cl.last_date ? cl.last_date : '') + (cl.recent_avg != null ? '  ·  avg ' + money(cl.recent_avg) : ''),
        },
        { name: 'Alt · value', val: money(alt.alt_value), sub: alt.alt_range || '' },
      ];
      for (const c of cards) {
        const el = document.createElement('div');
        el.className = 'card';
        el.innerHTML = '<div class="name">' + c.name + '</div><div class="val">' + c.val + '</div><div class="sub">' + c.sub + '</div>';
        summaryEl.appendChild(el);
      }
    }

    const cam = document.getElementById('cam');
    const photo = document.getElementById('photo');
    const tabsEl = document.getElementById('tabs');

    let lastData = null;
    let activeTab = 'cardladder';

    function begin(msg) {
      go.disabled = true; cam.disabled = true;
      statusEl.textContent = msg;
      labelEl.textContent = ''; summaryEl.innerHTML = ''; out.innerHTML = '';
      tabsEl.hidden = true;
      lastData = null;
    }
    function done() { go.disabled = false; cam.disabled = false; }

    function row(meta, desc, price, url) {
      // A real <a target="_blank"> — tapping opens the marketplace listing (eBay, etc.) in the
      // phone's actual browser, not inside this page (matters when installed as a home-screen app).
      const el = document.createElement(url ? 'a' : 'div');
      el.className = 'sale';
      if (url) { el.href = url; el.target = '_blank'; el.rel = 'noopener'; }
      el.innerHTML =
        '<div><div class="meta">' + meta + '</div>' +
        (desc ? '<div class="desc">' + desc + '</div>' : '') + '</div>' +
        '<div class="price">' + money(price) + '</div>';
      return el;
    }

    function renderCardLadder(cl) {
      const sales = cl.sales || [];
      if (!sales.length) { out.innerHTML = '<div class="sec-title">No sales found</div>'; return; }
      const wrap = document.createElement('div');
      wrap.innerHTML = '<div class="sec-title">Sales (' + sales.length + ')</div>';
      for (const s of sales) {
        wrap.appendChild(row([s.date, s.type, s.platform].filter(Boolean).join(' · '), s.title, s.price, s.url));
      }
      out.innerHTML = ''; out.appendChild(wrap);
    }

    function renderAlt(alt) {
      const listings = alt.listings || [], sales = alt.sales || [];
      out.innerHTML = '';
      if (listings.length) {
        const wrap = document.createElement('div');
        wrap.innerHTML = '<div class="sec-title">Live listings (' + listings.length + ')</div>';
        for (const l of listings) {
          const meta = [l.type, l.bids != null ? l.bids + ' bids' : null, l.time_left, l.source]
            .filter(Boolean).join(' · ');
          wrap.appendChild(row(meta, null, l.price, l.url));
        }
        out.appendChild(wrap);
      }
      if (sales.length) {
        const wrap = document.createElement('div');
        wrap.innerHTML = '<div class="sub-title">Recent sales (' + sales.length + ')</div>';
        for (const s of sales) wrap.appendChild(row([s.date, s.type].filter(Boolean).join(' · '), null, s.price, s.url));
        out.appendChild(wrap);
      }
      if (!listings.length && !sales.length) out.innerHTML = '<div class="sec-title">No listings or sales found</div>';
    }

    function renderTab() {
      if (!lastData) return;
      const d = lastData.data || {};
      if (activeTab === 'cardladder') renderCardLadder(d.cardladder || {});
      else renderAlt(d.alt || {});
    }

    for (const tab of tabsEl.querySelectorAll('.tab')) {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        for (const t of tabsEl.querySelectorAll('.tab')) t.classList.toggle('active', t === tab);
        renderTab();
      });
    }

    function showResult(data) {
      labelEl.textContent = data.label || data.cert || '';
      renderSummary(data.data);
      const notes = Object.entries(data.status || {})
        .filter(([, v]) => v !== 'ok').map(([k, v]) => k + ': ' + v);
      statusEl.textContent = notes.length ? '⚠️ ' + notes.join(' · ') : 'Done.';
      lastData = data;
      tabsEl.hidden = false;
      renderTab();
    }

    async function handle(makeRequest, waitingMsg) {
      begin(waitingMsg);
      try {
        const res = await makeRequest();
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
        if (data.candidates) {  // ambiguous OCR — let the user confirm
          certEl.value = data.candidates[0];
          statusEl.textContent = 'Found: ' + data.candidates.join(', ') + '. Check the cert and tap Look up.';
          return;
        }
        showResult(data);
      } catch (err) {
        statusEl.textContent = '❌ ' + err.message;
      } finally {
        done();
      }
    }

    f.addEventListener('submit', (e) => {
      e.preventDefault();
      const cert = certEl.value.replace(/\D/g, '');
      if (!cert) return;
      handle(() => fetch('/lookup?cert=' + encodeURIComponent(cert)),
             'Looking up ' + cert + '… (first lookup opens the browser, ~10s)');
    });

    // Cert labels are small text on a slab — this resolution is plenty for OCR, and keeping the
    // upload small makes it fast on cellular. Downscale/compress client-side before sending,
    // whether the photo came from the camera or the library.
    const MAX_DIM = 1600, JPEG_QUALITY = 0.85;

    function shrinkImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          const scale = Math.min(1, MAX_DIM / Math.max(width, height));
          width = Math.round(width * scale); height = Math.round(height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => resolve(blob || file), 'image/jpeg', JPEG_QUALITY);
        };
        img.onerror = () => resolve(file);  // fall back to the original on any decode issue
        img.src = url;
      });
    }

    cam.addEventListener('click', () => photo.click());
    photo.addEventListener('change', () => {
      const file = photo.files[0];
      photo.value = '';  // allow re-selecting the same file
      if (!file) return;
      handle(async () => {
        const small = await shrinkImage(file);
        const body = new FormData();
        body.append('photo', small, 'photo.jpg');
        return fetch('/lookup_image', { method: 'POST', body });
      }, 'Reading the cert from your photo…');
    });
  </script>
</body>
</html>
